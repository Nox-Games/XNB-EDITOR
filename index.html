<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XNB Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #020510;
    --surface: #050d1a;
    --panel: #071322;
    --border: #0a2a4a;
    --accent: #00cfff;
    --accent2: #0066ff;
    --green: #00eeff;
    --red: #ff4466;
    --text: #d0eeff;
    --muted: #3a6080;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb.one { background: #00cfff; top: -200px; left: -200px; opacity: 0.12; }
  .glow-orb.two { background: #0044ff; bottom: -200px; right: -200px; opacity: 0.12; }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  @keyframes floatUpDown {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-18px); }
    100% { transform: translateY(0px); }
  }

  @keyframes particleFade {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  header {
    margin-bottom: 48px;
    text-align: center;
    position: relative;
  }

  .logo-wrap {
    display: inline-block;
    position: relative;
    animation: floatUpDown 4s ease-in-out infinite;
  }

  #particle-canvas {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    width: 400px;
    height: 160px;
    margin-left: -200px;
    margin-top: -50px;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #00eeff, #0099ff, #0044ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    line-height: 1;
    filter: drop-shadow(0 0 18px rgba(0,180,255,0.7)) drop-shadow(0 0 40px rgba(0,100,255,0.4));
  }

  .tagline {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.03), rgba(124,58,237,0.03));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    box-shadow: 0 0 30px rgba(0,212,255,0.1);
  }
  .drop-zone:hover::before, .drop-zone.dragover::before { opacity: 1; }

  .drop-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
  .drop-title { font-family: var(--font-display); font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }
  .drop-sub { color: var(--muted); font-size: 0.8rem; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #33ddff; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.4); }

  .btn-success { background: var(--green); color: #000; }
  .btn-success:hover { background: #33ffaa; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,255,136,0.4); }

  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: rgba(255,68,102,0.1); }

  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  .file-list { display: none; flex-direction: column; gap: 12px; margin-top: 32px; }
  .file-list.visible { display: flex; }

  .section-title {
    font-family: var(--font-display);
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .file-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .file-card:hover { border-color: #3a4560; }
  .file-card.modified { border-color: var(--green); }
  .file-card.error { border-color: var(--red); }

  .file-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .file-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .file-icon.texture { background: rgba(0,212,255,0.15); }
  .file-icon.xml { background: rgba(124,58,237,0.15); }
  .file-icon.unknown { background: rgba(100,116,139,0.15); }

  .file-info { flex: 1; min-width: 0; }
  .file-name { font-weight: 700; font-size: 0.9rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { color: var(--muted); font-size: 0.72rem; margin-top: 2px; }

  .file-badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;
  }
  .badge-texture { background: rgba(0,212,255,0.1); color: var(--accent); }
  .badge-xml { background: rgba(124,58,237,0.1); color: #a78bfa; }
  .badge-modified { background: rgba(0,255,136,0.1); color: var(--green); }
  .badge-unknown { background: rgba(100,116,139,0.1); color: var(--muted); }

  .chevron { color: var(--muted); transition: transform 0.2s; font-size: 0.8rem; flex-shrink: 0; }
  .file-card.expanded .chevron { transform: rotate(180deg); }

  .file-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
  .file-card.expanded .file-body { display: block; }

  .texture-editor { display: flex; gap: 20px; padding-top: 16px; flex-wrap: wrap; }

  .texture-preview {
    flex-shrink: 0;
    background: repeating-conic-gradient(#1a1f2e 0% 25%, #12151c 0% 50%) 0 0 / 16px 16px;
    border-radius: 8px; border: 1px solid var(--border);
    width: 160px; height: 160px;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .texture-preview img { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; }

  .texture-controls {
    flex: 1; display: flex; flex-direction: column;
    gap: 10px; justify-content: center; min-width: 200px;
  }

  .info-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .info-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 0.75rem; color: var(--muted);
  }
  .info-chip span { color: var(--text); }

  .xml-editor-wrap { padding-top: 16px; }

  .xml-textarea {
    width: 100%; min-height: 200px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
    color: var(--text); font-family: var(--font-mono);
    font-size: 0.78rem; line-height: 1.6;
    resize: vertical; outline: none; transition: border-color 0.2s;
    white-space: pre; overflow-x: auto;
  }
  .xml-textarea:focus { border-color: var(--accent2); }

  .xml-toolbar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  .download-bar {
    display: none; margin-top: 32px;
    background: var(--panel); border: 1px solid var(--green);
    border-radius: 12px; padding: 20px 24px;
    align-items: center; gap: 16px; flex-wrap: wrap;
    box-shadow: 0 0 30px rgba(0,255,136,0.08);
  }
  .download-bar.visible { display: flex; }
  .download-bar-text { flex: 1; }
  .download-bar-title { font-weight: 700; color: var(--green); font-size: 0.9rem; }
  .download-bar-sub { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }

  .status { display: none; padding: 10px 16px; border-radius: 8px; font-size: 0.8rem; margin-top: 10px; }
  .status.ok { display: block; background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
  .status.err { display: block; background: rgba(255,68,102,0.1); color: var(--red); border: 1px solid rgba(255,68,102,0.2); }

  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 20px;
    font-size: 0.85rem; z-index: 100;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s ease; max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  input[type=file] { display: none; }

  .debug-box {
    background: rgba(0,10,30,0.7);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.7;
  }
  .debug-box span { color: var(--accent); }
  .debug-box table td { padding: 2px 0; vertical-align: top; }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    box-shadow: 0 0 40px rgba(0,180,255,0.18), inset 0 0 30px rgba(0,100,255,0.05);
  }

  .btn-primary { background: linear-gradient(135deg,#00cfff,#0066ff); color: #000; font-weight:800; }
  .btn-primary:hover { filter: brightness(1.2); transform: translateY(-1px); box-shadow: 0 4px 24px rgba(0,160,255,0.5); }

  .btn-success { background: linear-gradient(135deg,#00eeff,#0099ff); color: #000; font-weight:800; }
  .btn-success:hover { filter: brightness(1.15); transform: translateY(-1px); box-shadow: 0 4px 24px rgba(0,200,255,0.45); }

  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: 0.6; }
    70%  { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  @keyframes pulse-ring2 {
    0%   { transform: scale(1);   opacity: 0.4; }
    70%  { transform: scale(2.1); opacity: 0; }
    100% { transform: scale(2.1); opacity: 0; }
  }
  @keyframes btn-shimmer {
    0%   { box-shadow: 0 0 16px #00cfff, 0 0 40px #0066ff88, 0 0 80px #00cfff33; }
    50%  { box-shadow: 0 0 32px #00eeff, 0 0 70px #0099ffaa, 0 0 120px #00cfff55; }
    100% { box-shadow: 0 0 16px #00cfff, 0 0 40px #0066ff88, 0 0 80px #00cfff33; }
  }

  .site-fab {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00eeff 0%, #0077ff 55%, #0033cc 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    text-decoration: none;
    color: #fff;
    font-family: var(--font-display);
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    z-index: 200;
    animation: btn-shimmer 2s ease-in-out infinite;
    transition: transform 0.2s, filter 0.2s;
  }
  .site-fab:hover { transform: translateX(-50%) scale(1.1); filter: brightness(1.2); }
  .site-fab-inner { line-height: 1.4; font-size: 0.7rem; pointer-events: none; }
  .site-fab-inner span { display: block; font-size: 0.75rem; }

  .site-fab-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid #00cfff;
    animation: pulse-ring 2s ease-out infinite;
    pointer-events: none;
  }
  .site-fab-ring2 {
    border-color: #0066ff;
    animation: pulse-ring2 2s ease-out infinite 0.5s;
  }

  .by-nox {
    margin-top: 18px;
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .by-nox span {
    background: linear-gradient(135deg, #00eeff, #0066ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: 4px;
    filter: drop-shadow(0 0 10px rgba(0,180,255,0.8));
  }

  .file-card.modified { border-color: #00cfff; box-shadow: 0 0 16px rgba(0,180,255,0.15); }
  .badge-modified { background: rgba(0,180,255,0.12); color: #00cfff; }
</style>

<script>
// ─── Varint helpers ───────────────────────────────────────────────

function readVarint(data, offset) {
  let result = 0, shift = 0;
  while (true) {
    const byte = data[offset++];
    result |= (byte & 0x7F) << shift;
    shift += 7;
    if (!(byte & 0x80)) break;
  }
  return { value: result, offset };
}

function encodeVarint(value) {
  const bytes = [];
  while (true) {
    let byte = value & 0x7F;
    value >>>= 7;
    if (value) byte |= 0x80;
    bytes.push(byte);
    if (!value) break;
  }
  return new Uint8Array(bytes);
}

function readInt32LE(data, offset) {
  return (data[offset] | (data[offset+1]<<8) | (data[offset+2]<<16) | (data[offset+3]<<24)) >>> 0;
}

function writeInt32LE(val) {
  return new Uint8Array([val & 0xFF, (val>>8)&0xFF, (val>>16)&0xFF, (val>>24)&0xFF]);
}

function patchSize(result, newFileSize) {
  result[6] = newFileSize & 0xFF;
  result[7] = (newFileSize >> 8) & 0xFF;
  result[8] = (newFileSize >> 16) & 0xFF;
  result[9] = (newFileSize >> 24) & 0xFF;
}

// ─── XNB Parser ──────────────────────────────────────────────────

function parseXNB(buffer) {
  const data = new Uint8Array(buffer);

  // ── Header validation ──
  if (data[0] !== 0x58 || data[1] !== 0x4E || data[2] !== 0x42) {
    throw new Error('Arquivo inválido: não é um XNB (magic bytes incorretos)');
  }

  const platform = String.fromCharCode(data[3]); // w=Windows, m=Mac, x=Xbox
  const version  = data[4];                       // 5 = XNA 4.0 / MonoGame
  const flags    = data[5];
  const compressed = !!(flags & 0x80);

  if (compressed) {
    throw new Error('XNB comprimido (LZX) não é suportado. Descompacte antes de editar.');
  }

  const storedSize = readInt32LE(data, 6);

  // ── Reader list (starts at byte 10) ──
  let offset = 10;

  // reader count is a 7-bit encoded int (varint) in MonoGame XNB
  const rcInfo  = readVarint(data, offset);
  const readerCount = rcInfo.value;
  offset = rcInfo.offset;

  // Read only the FIRST reader (the one that describes the asset type)
  const nameLenInfo = readVarint(data, offset);
  offset = nameLenInfo.offset;
  const nameLen   = nameLenInfo.value;
  const readerName = new TextDecoder().decode(data.slice(offset, offset + nameLen));
  offset += nameLen;

  const readerVersion = readInt32LE(data, offset); offset += 4;

  // Collect all reader names (for debug + unknown type display)
  const allReaderNames = [readerName];

  // Skip remaining readers if any (but record their names)
  for (let r = 1; r < readerCount; r++) {
    const nl = readVarint(data, offset); offset = nl.offset;
    const rn = new TextDecoder().decode(data.slice(offset, offset + nl.value));
    allReaderNames.push(rn);
    offset += nl.value; // skip name
    offset += 4;        // skip version
  }

  // shared resource count (varint)
  const srcInfo = readVarint(data, offset);
  offset = srcInfo.offset;

  // offset now points to the first asset byte (object header)
  const headerEnd = offset;

  // ── Asset type dispatch ──
  const isTexture  = readerName.includes('Texture2DReader');
  const isXElement = readerName.includes('XElementReader');
  const isString   = readerName.includes('StringReader');

  if (isTexture) {
    // typeId (1 byte)
    const typeId = data[offset]; offset++;
    const surfaceFormat = readInt32LE(data, offset); offset += 4;
    const width         = readInt32LE(data, offset); offset += 4;
    const height        = readInt32LE(data, offset); offset += 4;
    const mipCount      = readInt32LE(data, offset); offset += 4;
    const dataSize      = readInt32LE(data, offset); offset += 4;
    const pixelData     = data.slice(offset, offset + dataSize);

    return {
      type: 'texture',
      platform, version, flags, storedSize,
      readerName, readerVersion, readerCount, headerEnd,
      typeId, surfaceFormat, width, height, mipCount,
      pixelData,
      originalBuffer: buffer
    };

  } else if (isXElement) {
    // ── FIX: skip typeId byte BEFORE reading the varint ──
    // The XNB object wrapper writes: typeId (1 byte) + 7-bit-encoded-length + UTF-8 bytes
    const typeId = data[offset]; offset++;               // <-- this was the bug (0x01 was being read as varint = 1)

    const xmlLenInfo = readVarint(data, offset);
    offset = xmlLenInfo.offset;
    const xmlLen  = xmlLenInfo.value;
    const xmlText = new TextDecoder().decode(data.slice(offset, offset + xmlLen));

    return {
      type: 'xml',
      platform, version, flags, storedSize,
      readerName, readerVersion, readerCount, headerEnd,
      typeId,
      xmlText,
      originalBuffer: buffer
    };

  } else if (isString) {
    // typeId (1 byte) + varint length + UTF-8 bytes
    const typeId = data[offset]; offset++;

    const strLenInfo = readVarint(data, offset);
    offset = strLenInfo.offset;
    const strLen  = strLenInfo.value;
    const strText = new TextDecoder().decode(data.slice(offset, offset + strLen));

    return {
      type: 'string',
      platform, version, flags, storedSize,
      readerName, readerVersion, readerCount, headerEnd,
      typeId, strText,
      originalBuffer: buffer
    };

  } else {
    return {
      type: 'unknown',
      platform, version, flags, storedSize,
      readerName, readerVersion, readerCount,
      allReaderNames, headerEnd,
      payloadBytes: data.slice(headerEnd),
      originalBuffer: buffer
    };
  }
}

// ─── Repack functions ─────────────────────────────────────────────

function repackXML(parsed, newXml) {
  const orig      = new Uint8Array(parsed.originalBuffer);
  const xmlBytes  = new TextEncoder().encode(newXml);
  const varint    = encodeVarint(xmlBytes.length);
  const typeIdArr = new Uint8Array([parsed.typeId]);

  // headerEnd = start of asset object (before typeId)
  const headerPart  = orig.slice(0, parsed.headerEnd);
  const newFileSize = headerPart.length + 1 + varint.length + xmlBytes.length;

  const result = new Uint8Array(newFileSize);
  let o = 0;
  result.set(headerPart, o);       o += headerPart.length;
  result.set(typeIdArr,  o);       o += 1;
  result.set(varint,     o);       o += varint.length;
  result.set(xmlBytes,   o);

  patchSize(result, newFileSize);
  return result.buffer;
}

function repackString(parsed, newText) {
  const orig      = new Uint8Array(parsed.originalBuffer);
  const strBytes  = new TextEncoder().encode(newText);
  const varint    = encodeVarint(strBytes.length);
  const typeIdArr = new Uint8Array([parsed.typeId]);

  const headerPart  = orig.slice(0, parsed.headerEnd);
  const newFileSize = headerPart.length + 1 + varint.length + strBytes.length;

  const result = new Uint8Array(newFileSize);
  let o = 0;
  result.set(headerPart, o); o += headerPart.length;
  result.set(typeIdArr,  o); o += 1;
  result.set(varint,     o); o += varint.length;
  result.set(strBytes,   o);

  patchSize(result, newFileSize);
  return result.buffer;
}

function repackTexture(parsed, newImageData, newWidth, newHeight) {
  const orig = new Uint8Array(parsed.originalBuffer);

  // RGBA → BGRA (XNA stores BGRA)
  const bgra = new Uint8Array(newImageData.length);
  for (let i = 0; i < newImageData.length; i += 4) {
    bgra[i]   = newImageData[i+2];
    bgra[i+1] = newImageData[i+1];
    bgra[i+2] = newImageData[i];
    bgra[i+3] = newImageData[i+3];
  }

  const w32 = (v) => new Uint8Array([v&0xFF,(v>>8)&0xFF,(v>>16)&0xFF,(v>>24)&0xFF]);

  const assetBytes = new Uint8Array([
    parsed.typeId,           // type id
    ...w32(0),               // surface format = Color (BGRA)
    ...w32(newWidth),
    ...w32(newHeight),
    ...w32(1),               // mip count
    ...w32(bgra.length),
    ...bgra
  ]);

  const headerPart  = orig.slice(0, parsed.headerEnd);
  const newFileSize = headerPart.length + assetBytes.length;

  const result = new Uint8Array(newFileSize);
  result.set(headerPart,  0);
  result.set(assetBytes,  headerPart.length);

  patchSize(result, newFileSize);
  return result.buffer;
}

// ─── Raw Binary repack (for unknown types) ────────────────────────

function repackRaw(parsed, newPayloadBytes) {
  const orig       = new Uint8Array(parsed.originalBuffer);
  const headerPart = orig.slice(0, parsed.headerEnd);
  const newFileSize = headerPart.length + newPayloadBytes.length;

  const result = new Uint8Array(newFileSize);
  result.set(headerPart,      0);
  result.set(newPayloadBytes, headerPart.length);

  patchSize(result, newFileSize);
  return result.buffer;
}

function exportPayload(filename, sid) {
  const parsed = files[filename].parsed;
  const blob   = new Blob([parsed.payloadBytes], { type: 'application/octet-stream' });
  const a      = document.createElement('a');
  a.href       = URL.createObjectURL(blob);
  a.download   = filename.replace(/\.xnb$/i, '_payload.bin');
  a.click();
  URL.revokeObjectURL(a.href);
  showToast(`✓ Payload extraído: ${parsed.payloadBytes.length} bytes`);
}

function importPayload(filename, sid, input) {
  const file = input.files[0];
  if (!file) return;
  const fr = new FileReader();
  fr.onload = (e) => {
    try {
      const newPayload = new Uint8Array(e.target.result);
      const newBuf = repackRaw(files[filename].parsed, newPayload);
      files[filename].newBuffer = newBuf;
      markModified(filename, sid);
      setStatus(sid,
        `✓ Payload importado! ${newPayload.length} bytes → XNB total ${newBuf.byteLength} bytes`,
        'ok');
    } catch (err) {
      setStatus(sid, '✗ Erro ao reimpacotar: ' + err.message, 'err');
    }
  };
  fr.onerror = () => setStatus(sid, '✗ Erro ao ler arquivo', 'err');
  fr.readAsArrayBuffer(file);
  // reset input so the same file can be re-selected
  input.value = '';
}



function textureToCanvas(parsed) {
  const canvas = document.createElement('canvas');
  canvas.width  = parsed.width;
  canvas.height = parsed.height;
  const ctx = canvas.getContext('2d');
  const imageData = ctx.createImageData(parsed.width, parsed.height);
  const px = parsed.pixelData;
  for (let i = 0; i < px.length; i += 4) {
    imageData.data[i]   = px[i+2]; // R (from B)
    imageData.data[i+1] = px[i+1]; // G
    imageData.data[i+2] = px[i];   // B (from R)
    imageData.data[i+3] = px[i+3]; // A
  }
  ctx.putImageData(imageData, 0, 0);
  return canvas;
}

// ─── State ────────────────────────────────────────────────────────

const files = {}; // filename → { parsed, modified, newBuffer }

// ─── UI helpers ───────────────────────────────────────────────────

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function updateDownloadBar() {
  const keys     = Object.keys(files);
  const bar      = document.getElementById('downloadBar');
  const sub      = document.getElementById('downloadSub');
  if (keys.length > 0) {
    bar.classList.add('visible');
    const modified = keys.filter(k => files[k].modified).length;
    sub.textContent = `${keys.length} arquivo(s) · ${modified} modificado(s)`;
  } else {
    bar.classList.remove('visible');
  }
}

function clearAll() {
  Object.keys(files).forEach(k => delete files[k]);
  document.getElementById('fileCards').innerHTML = '';
  document.getElementById('fileList').classList.remove('visible');
  updateDownloadBar();
}

function downloadAll() {
  Object.keys(files).forEach(filename => {
    const f   = files[filename];
    const buf = f.newBuffer || f.parsed.originalBuffer;
    const blob = new Blob([buf], { type: 'application/octet-stream' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  });
  showToast(`⬇ ${Object.keys(files).length} arquivo(s) baixado(s)!`);
}

function loadFiles(fileList) {
  Array.from(fileList).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = parseXNB(e.target.result);
        files[file.name] = { parsed, modified: false, newBuffer: null };
        renderCard(file.name, parsed);
        document.getElementById('fileList').classList.add('visible');
        document.getElementById('fileCount').textContent =
          `${Object.keys(files).length} arquivo(s) carregado(s)`;
        updateDownloadBar();
        showToast(`✓ ${file.name} carregado (${parsed.type})`);
      } catch (err) {
        showToast(`✗ ${file.name}: ${err.message}`, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

// ─── Card rendering ───────────────────────────────────────────────

function safeId(filename) {
  return filename.replace(/[^a-zA-Z0-9_\-]/g, '_');
}

function renderCard(filename, parsed) {
  const sid = safeId(filename);
  const existing = document.getElementById(`card-${sid}`);
  if (existing) existing.remove();

  const card = document.createElement('div');
  card.className = 'file-card';
  card.id = `card-${sid}`;

  const iconType   = parsed.type === 'texture' ? 'texture'
                   : (parsed.type === 'xml' || parsed.type === 'string') ? 'xml' : 'unknown';
  const iconEmoji  = parsed.type === 'texture' ? '🖼'
                   : parsed.type === 'xml'     ? '📄'
                   : parsed.type === 'string'  ? '📝' : '❓';
  const badgeClass = parsed.type === 'texture' ? 'badge-texture'
                   : (parsed.type === 'xml' || parsed.type === 'string') ? 'badge-xml' : 'badge-unknown';
  const badgeLabel = parsed.type === 'texture' ? 'Texture2D'
                   : parsed.type === 'xml'     ? 'XElement'
                   : parsed.type === 'string'  ? 'String'
                   : parsed.readerName.split(',')[0].split('.').pop().replace('Reader','');

  let metaText = '';
  if (parsed.type === 'texture') {
    metaText = `${parsed.width}×${parsed.height} px · Formato ${parsed.surfaceFormat} · ${parsed.storedSize} bytes`;
  } else if (parsed.type === 'xml') {
    const lines = parsed.xmlText.split(/\r?\n/).length;
    metaText = `${lines} linhas · ${parsed.xmlText.length} chars · ${parsed.storedSize} bytes`;
  } else if (parsed.type === 'string') {
    metaText = `${parsed.strText.split(/\r?\n/).length} linhas · ${parsed.storedSize} bytes`;
  } else {
    metaText = `${parsed.readerName.split(',')[0].split('.').pop()} · ${parsed.readerCount} reader(s) · ${parsed.storedSize} bytes`;
  }

  card.innerHTML = `
    <div class="file-header" onclick="toggleCard('${sid}')">
      <div class="file-icon ${iconType}">${iconEmoji}</div>
      <div class="file-info">
        <div class="file-name">${filename}</div>
        <div class="file-meta">${metaText}</div>
      </div>
      <span class="file-badge ${badgeClass}" id="badge-${sid}">${badgeLabel}</span>
      <span class="chevron">▼</span>
    </div>
    <div class="file-body" id="body-${sid}">
      ${renderBody(filename, sid, parsed)}
    </div>
  `;

  document.getElementById('fileCards').appendChild(card);

  if (parsed.type === 'texture') {
    try {
      const canvas = textureToCanvas(parsed);
      const previewEl = document.getElementById(`preview-${sid}`);
      const img = document.createElement('img');
      img.src = canvas.toDataURL();
      previewEl.innerHTML = '';
      previewEl.appendChild(img);
    } catch(e) {}
  }
}

function renderBody(filename, sid, parsed) {
  if (parsed.type === 'texture') {
    return `
      <div class="texture-editor">
        <div class="texture-preview" id="preview-${sid}">
          <span style="color:var(--muted);font-size:0.75rem">Carregando...</span>
        </div>
        <div class="texture-controls">
          <div class="info-row">
            <div class="info-chip">W: <span>${parsed.width}px</span></div>
            <div class="info-chip">H: <span>${parsed.height}px</span></div>
            <div class="info-chip">Format: <span>${parsed.surfaceFormat === 0 ? 'Color/BGRA' : parsed.surfaceFormat}</span></div>
            <div class="info-chip">Mips: <span>${parsed.mipCount}</span></div>
          </div>
          <button class="btn btn-primary" onclick="document.getElementById('img-input-${sid}').click()">
            🔄 Substituir Imagem
          </button>
          <button class="btn btn-ghost" onclick="exportTexture('${filename}','${sid}')">
            ⬇ Exportar como PNG
          </button>
          <input type="file" id="img-input-${sid}" accept="image/*" onchange="replaceTexture('${filename}','${sid}',this)">
          <div class="status" id="status-${sid}"></div>
        </div>
      </div>
    `;
  } else if (parsed.type === 'xml') {
    const escaped = parsed.xmlText
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const lines = parsed.xmlText.split(/\r?\n/).length;
    return `
      <div class="xml-editor-wrap">
        <div class="debug-box">
          Reader: <span>${parsed.readerName.split(',')[0]}</span> ·
          TypeID: <span>0x${parsed.typeId.toString(16).toUpperCase().padStart(2,'0')}</span> ·
          Tamanho original: <span>${parsed.xmlText.length} chars</span> ·
          Linhas: <span>${lines}</span>
        </div>
        <textarea class="xml-textarea" id="xml-${sid}" spellcheck="false" style="min-height:300px">${escaped}</textarea>
        <div class="xml-toolbar">
          <button class="btn btn-primary" onclick="saveXML('${filename}','${sid}')">💾 Salvar Alterações</button>
          <button class="btn btn-ghost"  onclick="resetXML('${filename}','${sid}')">↩ Resetar</button>
          <button class="btn btn-ghost"  onclick="exportTxt('${filename}','${sid}','xml')">⬇ Exportar .xml</button>
        </div>
        <div class="status" id="status-${sid}"></div>
      </div>
    `;
  } else if (parsed.type === 'string') {
    const lineCount = parsed.strText.split(/\r?\n/).length;
    return `
      <div class="xml-editor-wrap">
        <div class="debug-box">
          Reader: <span>${parsed.readerName.split(',')[0]}</span> ·
          TypeID: <span>0x${parsed.typeId.toString(16).toUpperCase().padStart(2,'0')}</span> ·
          Linhas: <span>${lineCount}</span>
        </div>
        <textarea class="xml-textarea" id="xml-${sid}" spellcheck="false" style="min-height:260px">${parsed.strText.replace(/</g,'&lt;')}</textarea>
        <div class="xml-toolbar">
          <button class="btn btn-primary" onclick="saveString('${filename}','${sid}')">💾 Salvar Alterações</button>
          <button class="btn btn-ghost"  onclick="resetString('${filename}','${sid}')">↩ Resetar</button>
          <button class="btn btn-ghost"  onclick="exportTxt('${filename}','${sid}','txt')">⬇ Exportar .txt</button>
        </div>
        <div class="status" id="status-${sid}"></div>
      </div>
    `;
  } else {
    // ── Unknown type: raw binary extract / reimport ──
    const hexPreview = Array.from(parsed.payloadBytes.slice(0, 48))
      .map(b => b.toString(16).padStart(2,'0')).join(' ');

    const readerRows = (parsed.allReaderNames || [parsed.readerName]).map((n, i) => {
      const short = n.split(',')[0].split('.').pop();
      return `<tr>
        <td style="color:var(--muted);padding-right:12px">[${i}]</td>
        <td style="color:var(--accent)">${short}</td>
        <td style="color:var(--muted);font-size:0.68rem;padding-left:12px">${n.split(',')[0]}</td>
      </tr>`;
    }).join('');

    return `
      <div class="xml-editor-wrap">
        <div class="debug-box">
          Platform: <span>${parsed.platform}</span> ·
          Version: <span>${parsed.version}</span> ·
          Flags: <span>0x${parsed.flags.toString(16).toUpperCase()}</span> ·
          Tamanho total: <span>${parsed.storedSize} bytes</span><br>
          Header XNB: <span>${parsed.headerEnd} bytes</span> ·
          Payload: <span>${parsed.payloadBytes.length} bytes</span> ·
          Readers: <span>${parsed.readerCount}</span>
        </div>

        <div class="debug-box" style="margin-top:8px">
          <div style="margin-bottom:6px;color:var(--muted)">Readers neste arquivo:</div>
          <table style="border-collapse:collapse;width:100%;font-size:0.72rem">${readerRows}</table>
        </div>

        <div class="debug-box" style="margin-top:8px;word-break:break-all">
          <div style="margin-bottom:4px;color:var(--muted)">Primeiros 48 bytes do payload (hex):</div>
          <span style="font-size:0.7rem;letter-spacing:1px">${hexPreview}</span>
        </div>

        <div style="margin-top:14px;padding:12px 14px;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.15);border-radius:8px;font-size:0.78rem;color:var(--muted);line-height:1.7">
          <strong style="color:var(--accent)">Fluxo de edição:</strong><br>
          1. <strong style="color:var(--text)">Extrair Payload</strong> → baixa o conteúdo binário (sem o cabeçalho XNB)<br>
          2. Edite o <code style="color:var(--accent2)">.bin</code> externamente (hex editor, ferramenta de modelo etc.)<br>
          3. <strong style="color:var(--text)">Importar Payload</strong> → reempacota com cabeçalho original + tamanho corrigido<br>
          4. Clique em <strong style="color:var(--green)">Baixar Todos</strong> para obter o <code>.xnb</code> final
        </div>

        <div class="xml-toolbar" style="margin-top:14px">
          <button class="btn btn-primary" onclick="exportPayload('${filename}','${sid}')">
            ⬇ Extrair Payload (.bin)
          </button>
          <button class="btn btn-success" onclick="document.getElementById('payload-input-${sid}').click()">
            ⬆ Importar Payload (.bin)
          </button>
          <button class="btn btn-ghost" onclick="downloadOriginal('${filename}')">
            📥 Baixar XNB Original
          </button>
          <input type="file" id="payload-input-${sid}" accept=".bin,*/*"
                 onchange="importPayload('${filename}','${sid}',this)">
        </div>
        <div class="status" id="status-${sid}"></div>
      </div>
    `;
  }
}

function toggleCard(sid) {
  const card = document.getElementById(`card-${sid}`);
  card.classList.toggle('expanded');
}

function setStatus(sid, msg, type) {
  const el = document.getElementById(`status-${sid}`);
  if (!el) return;
  el.className = `status ${type}`;
  el.textContent = msg;
}

function markModified(filename, sid) {
  const card = document.getElementById(`card-${sid}`);
  if (card) card.classList.add('modified');
  const badge = document.getElementById(`badge-${sid}`);
  if (badge) { badge.className = 'file-badge badge-modified'; badge.textContent = '✓ Modificado'; }
  files[filename].modified = true;
  updateDownloadBar();
}

// ─── Texture operations ───────────────────────────────────────────

function replaceTexture(filename, sid, input) {
  const file   = input.files[0];
  if (!file) return;
  const parsed = files[filename].parsed;
  const img    = new Image();
  const url    = URL.createObjectURL(file);

  img.onload = () => {
    try {
      const canvas = document.createElement('canvas');
      canvas.width  = parsed.width;
      canvas.height = parsed.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, parsed.width, parsed.height);
      const imageData = ctx.getImageData(0, 0, parsed.width, parsed.height);

      const newBuf = repackTexture(parsed, imageData.data, parsed.width, parsed.height);
      files[filename].newBuffer = newBuf;

      const previewEl  = document.getElementById(`preview-${sid}`);
      const previewImg = document.createElement('img');
      previewImg.src   = canvas.toDataURL();
      previewEl.innerHTML = '';
      previewEl.appendChild(previewImg);

      markModified(filename, sid);
      setStatus(sid, `✓ Imagem substituída (${parsed.width}×${parsed.height}) · ${newBuf.byteLength} bytes`, 'ok');
      URL.revokeObjectURL(url);
    } catch(e) {
      setStatus(sid, '✗ Erro: ' + e.message, 'err');
    }
  };
  img.onerror = () => setStatus(sid, '✗ Erro ao carregar imagem', 'err');
  img.src = url;
}

function exportTexture(filename, sid) {
  const parsed = files[filename].parsed;
  try {
    const canvas = textureToCanvas(parsed);
    const a = document.createElement('a');
    a.href     = canvas.toDataURL('image/png');
    a.download = filename.replace('.xnb', '.png');
    a.click();
    showToast(`✓ ${filename} exportado como PNG`);
  } catch(e) {
    showToast('✗ Erro ao exportar: ' + e.message, 'error');
  }
}

// ─── XML operations ───────────────────────────────────────────────

function saveXML(filename, sid) {
  const textarea = document.getElementById(`xml-${sid}`);
  const newXml   = textarea.value;

  // Proper XML validation (DOMParser never throws, returns parsererror element)
  const xmlDoc = new DOMParser().parseFromString(newXml, 'text/xml');
  const parseErr = xmlDoc.getElementsByTagName('parsererror');
  if (parseErr.length > 0) {
    const errMsg = parseErr[0].textContent.split('\n')[0];
    setStatus(sid, '✗ XML inválido: ' + errMsg, 'err');
    return;
  }

  try {
    const newBuf = repackXML(files[filename].parsed, newXml);
    files[filename].newBuffer = newBuf;
    markModified(filename, sid);
    setStatus(sid, `✓ Salvo! ${newXml.length} chars → ${newBuf.byteLength} bytes`, 'ok');
  } catch(e) {
    setStatus(sid, '✗ Erro ao repacotar: ' + e.message, 'err');
  }
}

function resetXML(filename, sid) {
  const textarea = document.getElementById(`xml-${sid}`);
  const parsed   = files[filename].parsed;
  textarea.value = parsed.xmlText;
  files[filename].newBuffer  = null;
  files[filename].modified   = false;
  const card  = document.getElementById(`card-${sid}`);
  const badge = document.getElementById(`badge-${sid}`);
  card.classList.remove('modified');
  badge.className   = 'file-badge badge-xml';
  badge.textContent = 'XElement';
  setStatus(sid, '↩ Resetado para original', 'ok');
  updateDownloadBar();
}

function saveString(filename, sid) {
  const textarea = document.getElementById(`xml-${sid}`);
  const newText  = textarea.value;
  try {
    const newBuf = repackString(files[filename].parsed, newText);
    files[filename].newBuffer = newBuf;
    markModified(filename, sid);
    const lines = newText.split(/\r?\n/).length;
    setStatus(sid, `✓ Salvo! ${lines} linhas · ${newBuf.byteLength} bytes`, 'ok');
  } catch(e) {
    setStatus(sid, '✗ Erro: ' + e.message, 'err');
  }
}

function resetString(filename, sid) {
  const textarea = document.getElementById(`xml-${sid}`);
  const parsed   = files[filename].parsed;
  textarea.value = parsed.strText;
  files[filename].newBuffer = null;
  files[filename].modified  = false;
  const card  = document.getElementById(`card-${sid}`);
  const badge = document.getElementById(`badge-${sid}`);
  card.classList.remove('modified');
  badge.className   = 'file-badge badge-xml';
  badge.textContent = 'String';
  setStatus(sid, '↩ Resetado para original', 'ok');
  updateDownloadBar();
}

function exportTxt(filename, sid, ext) {
  const parsed  = files[filename].parsed;
  const content = parsed.type === 'xml' ? parsed.xmlText : parsed.strText;
  const mime    = ext === 'xml' ? 'text/xml' : 'text/plain';
  const blob    = new Blob([content], { type: mime });
  const a       = document.createElement('a');
  a.href        = URL.createObjectURL(blob);
  a.download    = filename.replace('.xnb', '.' + ext);
  a.click();
  showToast(`✓ ${filename} exportado como .${ext}`);
}

function downloadOriginal(filename) {
  const buf  = files[filename].parsed.originalBuffer;
  const blob = new Blob([buf], { type: 'application/octet-stream' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// ─── Particle system ──────────────────────────────────────────────

(function() {
  const canvas = document.getElementById('particle-canvas');
  const ctx    = canvas.getContext('2d');
  const W = 400, H = 160;
  canvas.width  = W;
  canvas.height = H;

  const COLORS = ['#00eeff','#00cfff','#0099ff','#0044ff','#44aaff','#88ddff'];
  const particles = [];

  function spawnParticle() {
    const cx = W / 2 + (Math.random() - 0.5) * 180;
    const cy = H / 2 + (Math.random() - 0.5) * 30;
    particles.push({
      x: cx, y: cy,
      vx: (Math.random() - 0.5) * 2.2,
      vy: (Math.random() - 0.9) * 2.5,
      size: Math.random() * 3.5 + 1,
      life: 1,
      decay: Math.random() * 0.012 + 0.006,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      glow: Math.random() > 0.5
    });
  }

  function animateParticles() {
    ctx.clearRect(0, 0, W, H);

    // spawn 2-3 per frame
    const count = Math.random() < 0.5 ? 2 : 3;
    for (let i = 0; i < count; i++) spawnParticle();

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  -= 0.025; // float upward
      p.life -= p.decay;

      if (p.life <= 0) { particles.splice(i, 1); continue; }

      ctx.save();
      ctx.globalAlpha = p.life;
      if (p.glow) {
        ctx.shadowColor = p.color;
        ctx.shadowBlur  = 10;
      }
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    requestAnimationFrame(animateParticles);
  }

  animateParticles();
})();



const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  loadFiles(e.dataTransfer.files);
});
dropZone.addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') fileInput.click();
});
fileInput.addEventListener('change', e => loadFiles(e.target.files));
</script>
</body>
